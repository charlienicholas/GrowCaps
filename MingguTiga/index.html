<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>

    <link rel="stylesheet" href="style.css">

    <style>
        td {
            padding: 5px;
        }

        .btn-kirim{
            background-color: #7491cf;
            
        }

    </style>
</head>

<body style="background-color: #f4f4f4; justify-content: center;   align-items: center;    min-height: 100vh;   display: flex;  ">

    <form id="formpendaftaran" style="background: white; border-radius: 8px;  padding: 20px;  box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
       <h1 align="center">Form Pendaftaran Mahasiswa</h1>
        <table border="0">
            <tr>
                <td><label for="nama">Nama Mahasiswa</label></td>
                <td>:</td>
                <td><input type="text" id="nama"></td>
            </tr>
            <tr>
                <td><label for="email">Email</label></td>
                <td>:</td>
                <td><input type="email" id="email"></td>
            </tr>


            <tr>
                <td><label for="nim">NIM</label></td>
                <td>:</td>
                <td><input type="number" id="nim"></td>
            </tr>

             <tr>
                <td><label for="jk">Jenis Kelamin</label></td>
                <td>:</td>
                <td><input type="radio" name="jenis_kelamin" value="perempuan" id="">perempuan</td>
                <td><input type="radio" name="jenis_kelamin" value="pria" id="">pria</td>
            </tr>

            <tr>
                <td><label for="hobi">Hobi</label></td>
                <td>:</td>
                <td><input type="checkbox" name="hobi" value="renang">renang</td>
                <td><input type="checkbox" name="hobi" value="futsal">futsal</td>
                <td><input type="checkbox" name="hobi" value="badmin">badmin</td>
            </tr>

            <tr>
                <td><label for="tanggal">Tanggal Lahir</label></td>
                <td>:</td>
                <td><input type="date" id="tanggal"></td>
            </tr>
            <tr>
                <td><label for="password">Password</label></td>
                <td>:</td>
                <td><input type="password" id="password"></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td><button type="button" onclick="kliktombol()" class="btn-kirim" > Kirim </button></td>
            </tr>
        </table>
    </form>

    <script>
        function kliktombol() {
         
            var nama = document.getElementById("nama").value;
            var email = document.getElementById("email").value;

           
            if (nama === "") {
                alert("Nama anda masih kosong");
            } 
            else if (email === "") {
                alert("Email anda masih kosong");
            } 
            else {
                alert("Terima kasih " + nama + ", telah mengisi form!");
               
                document.getElementById("formpendaftaran").reset();
            }
        }
    </script>
</body>
</html>
